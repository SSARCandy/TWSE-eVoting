<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣股東會自動投票系統</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Fira+Code&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <aside id="sidebar">
            <header>
                <h1>股東會自動投票</h1>
                <div class="status-indicator">
                    <span id="status-dot" class="idle"></span>
                    <span id="status-text">閒置中</span>
                </div>
            </header>

            <section class="config-section">
                <div class="input-group">
                    <label for="ids">身分證字號清單 (以逗號分隔)</label>
                    <textarea id="ids" placeholder="A123456789,A223456789 ..."></textarea>
                </div>

                <div class="input-group">
                    <label for="output-dir">輸出資料夾 (截圖儲存路徑)</label>
                    <div class="path-selector">
                        <input type="text" id="output-dir" readonly placeholder="預設: 檔案/投票證明">
                        <button id="browse-btn" class="btn small">瀏覽...</button>
                    </div>
                </div>
            </section>

            <section class="controls">
                <button id="start-btn" class="btn primary">🚀 開始執行</button>
                <button id="stop-btn" class="btn danger" disabled>🛑 緊急停止</button>
            </section>

            <section class="progress-section">
                <div class="progress-info">
                    <span>進度: <span id="progress-val">0/0</span></span>
                    <div id="progress-bar-container">
                        <div id="progress-bar-fill"></div>
                    </div>
                </div>
            </section>

            <section class="log-section">
                <div class="log-header">
                    <span>執行日誌</span>
                    <div class="log-actions">
                        <button id="copy-log" class="btn small">複製</button>
                        <button id="clear-log" class="btn small">清除</button>
                    </div>
                </div>
                <div id="log-container"></div>
            </section>
        </aside>

        <main id="browser-placeholder">
            <!-- BrowserView will be positioned here by Main Process -->
            <div class="placeholder-content">
                <p>正在載入股東e票通...</p>
            </div>
        </main>
    </div>
    <script src="renderer.js"></script>
</body>

</html>
