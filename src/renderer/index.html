<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股東會投票幫手</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Fira+Code&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <aside id="sidebar">
            <header>
                <div class="title-container">
                    <h1>股東會投票幫手</h1>
                    <button class="version-text" id="about-icon">...</button>
                </div>
                <div class="status-indicator">
                    <span id="status-dot" class="idle"></span>
                    <span id="status-text">閒置中</span>
                </div>
            </header>

            <section class="config-section">
                <div class="input-group">
                    <label for="ids">
                        身分證字號清單 (逗號分隔)
                        <span class="info-icon" data-tooltip="可以輸入多筆身分證字號，請用半形逗號分隔。例如: A123456789,B123456789">i</span>
                    </label>
                    <textarea id="ids" placeholder="A123456789,A223456789 ..."></textarea>
                </div>

                <div class="input-group">
                    <label for="output-dir">
                        截圖儲存路徑
                        <span class="info-icon" data-tooltip="投票成功後的截圖證明會儲存到這個資料夾下。">i</span>
                    </label>
                    <div class="path-selector">
                        <input type="text" id="output-dir" readonly placeholder="預設: 檔案/投票證明">
                        <button id="browse-btn" class="btn small">瀏覽...</button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="folder-structure">
                        資料夾結構
                        <span class="info-icon"
                            data-tooltip="身分證字號分層: 分別建立身分證字號的子資料夾。&#10;扁平化檔案結構: 所有的截圖都放在指定資料夾內。">i</span>
                    </label>
                    <select id="folder-structure" class="select-input">
                        <option value="by_id">身分證字號分層 (子資料夾)</option>
                        <option value="flat">扁平化檔案結構 (全部存在同一層)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>
                        截圖檔名格式 (拖曳排序)
                        <span class="info-icon" data-tooltip="拖曳按鈕來調整檔名排序，兩兩之間會以底線分隔。&#10;必選：身分證字號、股票代號。">i</span>
                    </label>
                    <div id="filename-preview" class="filename-preview">
                        預覽：A123456789_2330.png
                    </div>
                    <div id="filename-chips" class="chips-container">
                        <!-- Chips will be generated by JS -->
                    </div>
                    <input type="hidden" id="filename-pattern">
                </div>
            </section>

            <section class="controls">
                <button id="start-btn" class="btn primary">🚀 開始執行</button>
                <button id="stop-btn" class="btn danger" disabled>🛑 緊急停止</button>
            </section>

            <section class="progress-section">
                <div class="progress-group">
                    <div class="progress-info">
                        <span>總進度
                            <span id="progress-status-text">
                                (帳號: 0/0 | 投票: 0/0 | 截圖: 0/0)
                            </span>
                        </span>
                        <span id="overall-progress-val">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div id="overall-progress-fill" class="progress-bar-fill"></div>
                    </div>
                </div>
            </section>

            <section class="log-section">
                <div class="log-header">
                    <span>執行日誌</span>
                    <div class="log-actions">
                        <button id="copy-log" class="btn small">複製</button>
                        <button id="clear-log" class="btn small">清除</button>
                    </div>
                </div>
                <div id="log-container"></div>
            </section>
        </aside>

        <main id="browser-placeholder">
            <!-- BrowserView will be positioned here by Main Process -->
            <div class="placeholder-content">
                <p>正在載入股東e票通...</p>
            </div>
        </main>
    </div>
    <script src="renderer.js"></script>
</body>

</html>
